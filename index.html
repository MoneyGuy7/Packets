<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pack Draw Empire</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#07111f;
    color:white;
}

h1{
    text-align:center;
    color:#22c55e;
    font-size:40px;
    margin-top:20px;
}

.subtitle{
    text-align:center;
    color:#cbd5e1;
}

.section{
    width:90%;
    max-width:900px;
    margin:20px auto;
    background:#111827;
    padding:20px;
    border-radius:20px;
}

.pack-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.arrow{
    width:50px;
    height:50px;
    border-radius:12px;
    border:none;
    background:#1f2937;
    color:white;
    font-size:22px;
    cursor:pointer;
}

.arrow:hover{
    background:#22c55e;
    color:black;
}

.pack-title{
    text-align:center;
    font-size:26px;
    color:#22c55e;
    font-weight:bold;
}

.pack-cost{
    text-align:center;
    color:#94a3b8;
}

.result-box{
    text-align:center;
    margin-top:15px;
}

.result-box img{
    width:100%;
    height:300px;
    object-fit:cover;
    border-radius:15px;
}

.prize-name{
    font-size:28px;
    margin-top:10px;
    font-weight:bold;
}

.prize-price{
    color:#22c55e;
    font-size:20px;
}

button{
    width:100%;
    padding:15px;
    margin-top:15px;
    border:none;
    border-radius:12px;
    background:#22c55e;
    font-weight:bold;
    cursor:pointer;
}

.stats{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.stat{
    background:#0f172a;
    padding:15px;
    border-radius:15px;
}

.stat-value{
    color:#22c55e;
    font-size:24px;
    font-weight:bold;
}

.inventory-item{
    background:#0f172a;
    padding:12px;
    margin-bottom:10px;
    border-radius:12px;
}
</style>
</head>

<body>

<h1>🎰 Pack Draw Empire</h1>
<p class="subtitle">Start $100 • Progress through 10 tiers • Build wealth</p>

<div class="section">

<div class="pack-header">
<button class="arrow" onclick="prevPack()">⬅</button>

<div>
<div class="pack-title" id="packTitle"></div>
<div class="pack-cost" id="packCost"></div>
</div>

<button class="arrow" onclick="nextPack()">➡</button>
</div>

<div class="result-box">
<img id="img">
<div class="prize-name" id="name">Press Open</div>
<div class="prize-price" id="price">$0</div>
<p id="desc"></p>

<button onclick="openPack()">OPEN PACK</button>
</div>

</div>

<!-- STATS -->
<div class="section">
<h2 style="color:#22c55e;">Stats</h2>

<div class="stats">
<div class="stat">
Money<br>
<div class="stat-value" id="money">$100</div>
</div>

<div class="stat">
Best Pull<br>
<div class="stat-value" id="best">None</div>
</div>
</div>

</div>

<!-- INVENTORY -->
<div class="section">
<h2 style="color:#22c55e;">Inventory</h2>
<div id="inv"></div>
</div>

/* ===== GAME LOGIC ===== */

function load(){
document.getElementById("packTitle").innerText = packs[current].title;
document.getElementById("packCost").innerText = "Cost: $" + packs[current].cost;
}

function prevPack(){
current--;
if(current<0) current=packs.length-1;
load();
}

function nextPack(){
current++;
if(current>=packs.length) current=0;
load();
}

function openPack(){
let pack = packs[current];

if(money < pack.cost){
alert("Not enough money");
return;
}

money -= pack.cost;

let i=0;
let spin = setInterval(()=>{

let item = pack.items[Math.floor(Math.random()*pack.items.length)];

document.getElementById("img").src = item.image || "https://images.unsplash.com/photo-1503376780353";
document.getElementById("name").innerText = item.name;
document.getElementById("price").innerText = "$"+item.value;
document.getElementById("desc").innerText = "Lucky pull!";

i++;

if(i>25){
clearInterval(spin);

inventory.push(item);

if(best==="None" || item.value>0){
best=item.name;
}

update();
}
},100);
}

function update(){
document.getElementById("money").innerText = "$"+money;
document.getElementById("best").innerText = best;

let box = document.getElementById("inv");
box.innerHTML="";

inventory.forEach((i,index)=>{
box.innerHTML += `
<div class="inventory-item">
<b>${i.name}</b><br>
$${i.value}
<button onclick="sell(${index})">Sell</button>
</div>`;
});
}

function sell(i){
money += inventory[i].value;
inventory.splice(i,1);
update();
}

load();
update();

</script>
